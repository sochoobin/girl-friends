<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔞 [LIVE] ILLEGAL SLAVE DATABASE 🔞</title>
    <style>
        /* 극강의 딥웹 감성 - 블랙, 레드, 네온 핑크 */
        body {
            background-color: #000000;
            color: #ff0055;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 10px;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }
        
        /* 눈을 테러하는 네온 깜빡이 경고 배너 */
        .illegal-banner {
            background: #200000;
            color: #ff0000;
            padding: 12px;
            font-weight: bold;
            border: 3px dashed #ff0055;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
            font-size: 14px;
            animation: flash 0.3s infinite alternate;
        }
        @keyframes flash {
            0% { border-color: #ff0055; background-color: #100000; }
            100% { border-color: #ff3333; background-color: #300000; }
        }

        /* 화려한 성인 광고 배너 스타일 */
        .adult-ad {
            display: block;
            margin: 15px 0;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: black;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            text-decoration: none;
            border: 2px solid white;
            animation: ad-pulse 0.5s infinite alternate;
        }
        @keyframes ad-pulse {
            0% { transform: scale(1); border-color: white; }
            100% { transform: scale(1.03); border-color: #ffff00; }
        }

        h1 {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0055;
            font-size: 26px;
            margin-bottom: 0;
        }

        .warning-text {
            color: #ff5555;
            font-size: 10px;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        /* 메인 타겟(남규빈) 전용 박스 - 좀 더 튀게 디자인 */
        .main-target-box {
            background: #110000;
            border: 2px solid #ff0000;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            text-align: left;
        }

        /* 일반 타겟 리스트 박스 */
        .section-box {
            background: #0a0505;
            border: 2px solid #ff0033;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.2);
            text-align: left;
        }

        .section-title {
            font-size: 16px;
            color: #ff0055;
            text-shadow: 0 0 5px #ff0055;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 개별 프로필 카드 내부 스타일 (사진 위, 정보 아래) */
        .profile-card {
            background: #1a000d;
            border: 1px solid #ff0055;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        /* 사진 영역 */
        .photo-area {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        /* 크게 키운 이미지 컨테이너 */
        .img-container {
            width: 120px;
            height: 160px;
            background: #111;
            border: 2px dashed #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin: auto;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .file-upload {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 정보 입력창 영역 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 입력창 디자인 */
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #ff0033;
            color: #fff;
            text-align: left;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
            outline: none;
        }

        /* 아이폰 크롬 동그라미 버그 완전 차단 select 스타일 */
        select {
            width: 100%;
            padding: 12px;
            background-color: #ffffff !important; 
            color: #000000 !important;            
            border: 2px solid #ff0055;
            text-align: left;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            -webkit-appearance: none !important; 
            appearance: none !important;
            border-radius: 0px !important;        
        }

        /* 버튼 디자인 */
        .btn {
            background: #111;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover {
            background: #ff0055;
            color: #000;
        }
        .btn-save {
            background: #ff0000;
            color: #fff;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            margin-top: 20px;
            text-shadow: 0 0 5px #000;
            font-weight: bold;
            border: 2px dashed #ffffff;
        }
        .btn-del {
            background: #400000;
            border: 1px solid #ff0000;
            color: #ff3333;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="illegal-banner">
        🚨 WARNING: DEEP WEB DATABASE CONNECTED 🚨 <br>
        실시간 타겟 IP 감시 중... 정보 무단 유출 시 형사 처벌!
    </div>

    <a href="#" class="adult-ad">🔥 [광고] 야한 동영상 실시간 스트리밍! 지금 가입! 🔥</a>

    <h1>🔞 TARGET SLAVE DATABASE 🔞</h1>
    <div class="warning-text">CONFIDENTIAL ARCHIVE // VIEW-ONLY MODE</div>

    <div class="main-target-box">
        <div class="section-title">🚨 PRIMARY TARGET #000 🚨</div>
        <div class="profile-card">
            <div class="photo-area">
                <div class="img-container" id="box_main_img">
                    <span style="color:#ff0055">증명사진 등록</span>
                    <input type="file" class="file-upload" onchange="processImage(this, 'main_img')" accept="image/*">
                </div>
            </div>
            <div class="info-area">
                <input type="text" id="t_name" placeholder="타겟 이름 (예: 남규빈)">
                <input type="number" id="t_age" placeholder="타겟 나이">
                <input type="text" id="t_rrn" placeholder="주민등록번호 (000000-0000000)">
                <input type="text" id="t_phone" placeholder="전화번호 (010-XXXX-XXXX)">
                <input type="text" id="t_addr" placeholder="거주지 주소">
                <input type="text" id="t_dong" placeholder="동/호수">
                <input type="text" id="t_pw" placeholder="도어락 비밀번호 (침입용)">
                <input type="number" id="t_height" placeholder="키 (cm)">
                <input type="number" id="t_weight" placeholder="몸무게 (kg)">
                <input type="text" id="t_size" placeholder="신체 사이즈">
                <select id="t_rank">
                    <option value="A+">굴복도 평가: A+</option>
                    <option value="A">A</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B">B</option><option value="B-">B-</option>
                    <option value="C+">C+</option><option value="C">C</option><option value="C-">C-</option>
                </select>
            </div>
        </div>
    </div>

    <a href="#" class="adult-ad" style="animation-duration: 0.3s; background: linear-gradient(90deg, #ffff00, #ff0000);">🍑 [광고] 핑크 끈팬티 특별 기획전! 입장! 🍑</a>

    <div class="section-box">
        <div class="section-title">🔒 SUB TARGET SLAVE LIST 🔒</div>
        <div style="margin-bottom: 15px; text-align: left;">
            <button class="btn" onclick="addNewRow()">＋ 타겟 추가</button>
        </div>

        <div id="archiveBody">
            </div>
    </div>

    <button class="btn btn-save" onclick="saveAllDatabaseData()">⚡ 데이터베이스 은밀하게 동기화 (SAVE) ⚡</button>

    <div class="illegal-banner" style="margin-top: 25px; animation-duration: 0.15s;">
        🔥 [AD] 국내 최저가 성인용품 기획전 🔥
    </div>

    <script>
        let rowCounter = 0;

        window.onload = function() {
            // 1. 메인 타겟(남규빈) 정보 복원
            const fields = ['name', 'age', 'rrn', 'phone', 'addr', 'dong', 'pw', 'height', 'weight', 'size', 'rank'];
            fields.forEach(f => {
                const val = localStorage.getItem(`target_main_${f}`);
                if (val) document.getElementById(`t_${f}`).value = val;
            });
            const mainImg = localStorage.getItem('main_img');
            if (mainImg) {
                document.getElementById('box_main_img').innerHTML = `<img src="${mainImg}"><input type="file" class="file-upload" onchange="processImage(this, 'main_img')" accept="image/*">`;
            }

            // 2. 서브 타겟 리스트 복원
            const savedState = localStorage.getItem('sub_target_state');
            if (savedState) {
                const rowIds = JSON.parse(savedState);
                if (rowIds.length === 0) {
                    addNewRow();
                } else {
                    rowIds.forEach(id => {
                        createRowElement(id);
                        rowCounter = Math.max(rowCounter, id + 1);
                    });
                }
            } else {
                addNewRow();
            }
        };

        function createRowElement(id) {
            const container = document.getElementById('archiveBody');
            
            const savedName = localStorage.getItem(`sub_name_${id}`) || '';
            const savedAge = localStorage.getItem(`sub_age_${id}`) || '';
            const savedRank = localStorage.getItem(`sub_rank_${id}`) || 'A+';
            const savedImg1 = localStorage.getItem(`sub_img1_${id}`) || '';
            const savedImg2 = localStorage.getItem(`sub_img2_${id}`) || '';

            const card = document.createElement('div');
            card.className = 'profile-card';
            card.id = `row_${id}`;
            card.innerHTML = `
                <div class="photo-area">
                    <div class="img-container" id="box_sub_img1_${id}">
                        ${savedImg1 ? `<img src="${savedImg1}">` : '<span style="color:#ff0055">+</span>'}
                        <input type="file" class="file-upload" onchange="processImage(this, 'sub_img1_${id}')" accept="image/*">
                    </div>
                    <div class="img-container" id="box_sub_img2_${id}">
                        ${savedImg2 ? `<img src="${savedImg2}">` : '<span style="color:#ff0055">+</span>'}
                        <input type="file" class="file-upload" onchange="processImage(this, 'sub_img2_${id}')" accept="image/*">
                    </div>
                </div>
                <div class="info-area">
                    <input type="text" id="sub_name_${id}" value="${savedName}" placeholder="노예 이름">
                    <input type="number" id="sub_age_${id}" value="${savedAge}" placeholder="나이">
                    <select id="sub_rank_${id}">
                        ${['A+', 'A', 'A-', 'B+', 'B', 'B-', 'C+', 'C', 'C-'].map(r => 
                            `<option value="${r}" ${savedRank === r ? 'selected' : ''}>꼴림도: ${r}</option>`
                        ).join('')}
                    </select>
                </div>
                <button class="btn-del" onclick="deleteRow(${id})">❌ 이 타겟 데이터 삭제</button>
            `;
            container.appendChild(card);
        }

        function addNewRow() {
            createRowElement(rowCounter);
            rowCounter++;
        }

        function deleteRow(id) {
            const card = document.getElementById(`row_${id}`);
            if (card) card.remove();
        }

        function processImage(input, key) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                try {
                    localStorage.setItem(key, base64Data);
                    const box = document.getElementById(`box_${key}`);
                    box.innerHTML = `<img src="${base64Data}"><input type="file" class="file-upload" onchange="processImage(this, '${key}')" accept="image/*">`;
                } catch (error) {
                    alert('사진 용량 초과! 폰 메모리가 거부했습니다. 크기를 줄여주세요.');
                }
            };
            reader.readAsDataURL(file);
        }

        function saveAllDatabaseData() {
            // 메인 타겟 정보 저장
            const fields = ['name', 'age', 'rrn', 'phone', 'addr', 'dong', 'pw', 'height', 'weight', 'size', 'rank'];
            fields.forEach(f => {
                const val = document.getElementById(`t_${f}`).value;
                localStorage.setItem(`target_main_${f}`, val);
            });

            // 서브 타겟 정보 저장
            const container = document.getElementById('archiveBody');
            const cards = container.querySelectorAll('.profile-card');
            const rowIds = [];

            cards.forEach(card => {
                const id = card.id.replace('row_', '');
                rowIds.push(parseInt(id));

                const nameVal = document.getElementById(`sub_name_${id}`).value;
                const ageVal = document.getElementById(`sub_age_${id}`).value;
                const rankVal = document.getElementById(`sub_rank_${id}`).value;

                localStorage.setItem(`sub_name_${id}`, nameVal);
                localStorage.setItem(`sub_age_${id}`, ageVal);
                localStorage.setItem(`sub_rank_${id}`, rankVal);
            });

            localStorage.setItem('sub_target_state', JSON.stringify(rowIds));
            alert('🔞 [SYSTEM] 타겟 데이터가 딥웹 서버(오빠의 폰 메모리)에 은밀하게 동기화되었습니다.');
        }
    </script>
</body>
</html>
