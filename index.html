<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠ [LIVE] SLAVE ARCHIVE DATABASE ☠</title>
    <style>
        /* 검은색 배경과 핫핑크, 레드의 자극적인 불법 사이트 감성 */
        body {
            background-color: #000000;
            color: #ff0055;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 10px;
            text-align: center;
            margin: 0;
        }
        
        /* 깜빡이는 경고성 상단 배너 */
        .neon-banner {
            background: #111;
            color: #ff0000;
            padding: 12px;
            font-weight: bold;
            border: 3px solid #ff0055;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #ff0000;
            animation: blinker 0.4s infinite alternate;
        }
        @keyframes blinker {
            0% { border-color: #ff0055; color: #ff0000; }
            100% { border-color: #ff0000; color: #ff00ff; }
        }

        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0000;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #ff3333;
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 컨트롤 버튼 구역 */
        .control-panel {
            margin-bottom: 15px;
        }
        .btn {
            background: #111;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
            border-radius: 4px;
        }
        .btn:hover {
            background: #ff0055;
            color: #000;
            box-shadow: 0 0 10px #ff0055;
        }
        .btn-save {
            background: #ff0000;
            color: #fff;
            border: 2px solid #ff0055;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 20px;
            text-shadow: 0 0 5px #000;
        }

        /* 메인 데이터 테이블 */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #0a0a0a;
            color: #ffffff;
            margin-top: 10px;
            font-size: 12px;
        }
        th, td {
            border: 2px solid #ff0055;
            padding: 6px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #1a000a;
            color: #ff3333;
            font-weight: bold;
        }

        /* 이미지 업로드 박스 */
        .img-container {
            width: 55px;
            height: 70px;
            background: #111;
            border: 1px dashed #ff0000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin: auto;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .file-upload {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 입력 폼 스타일 */
        input[type="text"], input[type="number"], select {
            width: 95%;
            padding: 5px;
            background: #000;
            border: 1px solid #ff0000;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: #ff0055;
            outline: none;
        }

        .btn-del {
            background: #300;
            border: 1px solid #ff0000;
            color: #ff3333;
            padding: 3px 8px;
            cursor: pointer;
        }
        .btn-del:hover {
            background: #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="neon-banner">
        ⚠️ WARNING: UNAUTHORIZED ACCESS PROHIBITED ⚠️<br>
        [접속인가 완료] 암컷 노예 프로필 시스템 v4.82
    </div>

    <h1>☠ FEMALE SLAVE DATABASE ☠</h1>
    <div class="subtitle">PRIVATE DEEP ARCHIVE SYSTEM</div>

    <div class="control-panel">
        <button class="btn" onclick="addNewRow()">＋ 타겟 추가</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>사진 1</th>
                <th>사진 2</th>
                <th>이름</th>
                <th>나이</th>
                <th>꼴림도</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="archiveBody">
            </tbody>
    </table>

    <button class="btn btn-save" onclick="saveArchiveData()">⚡ 전용 스토리지에 데이터 동기화 (SAVE) ⚡</button>

    <div class="neon-banner" style="margin-top: 25px; animation-duration: 0.2s;">
        🔥 [AD] 실시간 시크릿 옥션 진행 중 - 입장하기 🔥
    </div>

    <script>
        // 고유 매칭을 위한 카운터 변수
        let rowCounter = 0;

        // 페이지 로드 시 기존 데이터를 불러옴
        window.onload = function() {
            const savedState = localStorage.getItem('slave_archive_state');
            if (savedState) {
                const rowIds = JSON.parse(savedState);
                if (rowIds.length === 0) {
                    addNewRow(); // 저장된 데이터가 없으면 기본 1행 생성
                } else {
                    rowIds.forEach(id => {
                        createRowElement(id);
                        rowCounter = Math.max(rowCounter, id + 1);
                    });
                }
            } else {
                addNewRow(); // 최초 접속 시 기본 1행 생성
            }
        };

        // 새로운 행 구조를 생성하는 핵심 함수
        function createRowElement(id) {
            const tbody = document.getElementById('archiveBody');
            
            // 기존 로컬 스토리지 데이터 로드 (없으면 공백)
            const savedName = localStorage.getItem(`slave_name_${id}`) || '';
            const savedAge = localStorage.getItem(`slave_age_${id}`) || '';
            const savedRank = localStorage.getItem(`slave_rank_${id}`) || 'A+';
            const savedImg1 = localStorage.getItem(`slave_img1_${id}`) || '';
            const savedImg2 = localStorage.getItem(`slave_img2_${id}`) || '';

            const tr = document.createElement('tr');
            tr.id = `row_${id}`;
            tr.innerHTML = `
                <td>
                    <div class="img-container" id="box_slave_img1_${id}">
                        ${savedImg1 ? `<img src="${savedImg1}">` : '<span style="color:#ff0055">+</span>'}
                        <input type="file" class="file-upload" onchange="processImage(this, 'slave_img1_${id}')" accept="image/*">
                    </div>
                </td>
                <td>
                    <div class="img-container" id="box_slave_img2_${id}">
                        ${savedImg2 ? `<img src="${savedImg2}">` : '<span style="color:#ff0055">+</span>'}
                        <input type="file" class="file-upload" onchange="processImage(this, 'slave_img2_${id}')" accept="image/*">
                    </div>
                </td>
                <td><input type="text" id="slave_name_${id}" value="${savedName}" placeholder="NAME"></td>
                <td><input type="number" id="slave_age_${id}" value="${savedAge}" placeholder="AGE"></td>
                <td>
                    <select id="slave_rank_${id}">
                        ${['A+', 'A', 'A-', 'B+', 'B', 'B-', 'C+', 'C', 'C-'].map(r => 
                            `<option value="${r}" ${savedRank === r ? 'selected' : ''}>${r}</option>`
                        ).join('')}
                    </select>
                </td>
                <td>
                    <button class="btn-del" onclick="deleteRow(${id})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        // [행 추가] 버튼 클릭 시
        function addNewRow() {
            createRowElement(rowCounter);
            rowCounter++;
        }

        // [행 삭제] 버튼 클릭 시 해당 DOM 요소 제거
        function deleteRow(id) {
            const tr = document.getElementById(`row_${id}`);
            if (tr) {
                tr.remove();
            }
        }

        // 이미지 파일 처리 및 Base64 인코딩 후 스토리지 할당
        function processImage(input, key) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                try {
                    localStorage.setItem(key, base64Data);
                    const box = document.getElementById(`box_${key}`);
                    box.innerHTML = `<img src="${base64Data}"><input type="file" class="file-upload" onchange="processImage(this, '${key}')" accept="image/*">`;
                } catch (error) {
                    alert('용량이 너무 큽니다. 다른 사진을 선택하거나 고화질 캡처본은 크기를 줄여주세요.');
                }
            };
            reader.readAsDataURL(file);
        }

        // 현재 화면의 상태와 모든 텍스트 값들을 일괄 저장
        function saveArchiveData() {
            const tbody = document.getElementById('archiveBody');
            const rows = tbody.querySelectorAll('tr');
            const rowIds = [];

            rows.forEach(row => {
                const id = row.id.replace('row_', '');
                rowIds.push(parseInt(id));

                const nameVal = document.getElementById(`slave_name_${id}`).value;
                const ageVal = document.getElementById(`slave_age_${id}`).value;
                const rankVal = document.getElementById(`slave_rank_${id}`).value;

                localStorage.setItem(`slave_name_${id}`, nameVal);
                localStorage.setItem(`slave_age_${id}`, ageVal);
                localStorage.setItem(`slave_rank_${id}`, rankVal);
            });

            // 현재 존재하는 행들의 ID 리스트를 배열로 저장
            localStorage.setItem('slave_archive_state', JSON.stringify(rowIds));
            alert('🔒 데이터 무단 유출 방지 및 암호화 저장이 완료되었습니다.');
        }
    </script>
</body>
</html>
